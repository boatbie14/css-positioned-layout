<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <script
      src="https://kit.fontawesome.com/bf7220ad33.js"
      crossorigin="anonymous"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap"
      rel="stylesheet"
    />
    <title>Positioned Layout Exercise 2 TechUp Chatroom</title>
  </head>

  <body>
    <header>Techup Chatroom</header>

    <section id="chat-container">
      <div class="mychat-container">
        <div class="mychat chat-bubble">สวัสดีจ้า</div>
      </div>

      <div class="mychat-container">
        <div class="cancel mychat chat-bubble">Code สนุกจังเลย</div>
        <button class="cancel-btn">x</button>
      </div>

      <div class="mychat-container">
        <div class="mychat chat-bubble">🥳🥰</div>
      </div>

      <div class="friend-container">
        <div class="friend-chat chat-bubble">😍</div>
      </div>

      <div class="friend-container">
        <div class="friend-chat chat-bubble">🥳</div>
      </div>
    </section>
  </body>
</html>
